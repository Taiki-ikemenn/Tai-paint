<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>たいドロー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
<style>
  :root{
    --navy:#10182B; --navy-2:#182240; --card:#1C2747;
    --ink:#F3F1EA; --ink-dim:#9AA4C4;
    --violet:#B47CFF; --pink:#FF7AAE; --teal:#48D8C7; --amber:#FF9A3D;
    --line:#2C3760; --danger:#FF6B6B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    background:
      radial-gradient(1100px 600px at 15% -10%, #2A2450 0%, transparent 60%),
      radial-gradient(900px 500px at 110% 10%, #1B2A4A 0%, transparent 55%),
      var(--navy);
    color:var(--ink); font-family:'M PLUS Rounded 1c', sans-serif;
  }
  .mono{font-family:'JetBrains Mono', monospace;}
  .hidden{ display:none !important; }
  .screen{ min-height:100vh; padding:20px 14px 40px; }
  .wrap{ max-width:480px; margin:0 auto; }

  .brand{ display:flex; align-items:center; gap:10px; margin-bottom:16px; padding-left:2px; }
  .brand .mark{
    width:32px;height:32px;border-radius:10px;
    background:linear-gradient(145deg, var(--violet), var(--pink));
    display:flex;align-items:center;justify-content:center;
    font-weight:800; color:#1C1030; font-size:15px;
  }
  .brand span{ font-weight:800; font-size:16px; }
  .brand small{ color:var(--ink-dim); font-size:11px; display:block; }

  .card{
    background:var(--card); border:1px solid var(--line); border-radius:18px;
    padding:20px; box-shadow:0 16px 40px rgba(0,0,0,.32); margin-bottom:14px;
  }
  h1{ font-size:19px; margin:0 0 4px; font-weight:800; }
  .sub{ color:var(--ink-dim); font-size:13px; margin:0 0 16px; line-height:1.5; }

  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:12px; color:var(--ink-dim); margin-bottom:6px; }
  .field input, .field select{
    width:100%; padding:11px 13px; background:var(--navy-2); border:1px solid var(--line);
    border-radius:11px; color:var(--ink); font-size:14px; font-family:inherit; outline:none;
  }
  .field input:focus{ border-color:var(--violet); }

  .btn{
    width:100%; padding:12px 14px; border-radius:11px; border:none;
    font-family:inherit; font-weight:700; font-size:14px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn:active{ transform:scale(.98); }
  .btn-primary{ background:var(--violet); color:#1C1030; margin-top:6px; }
  .btn-google{ background:#fff; color:#1F2937; margin-top:8px; }
  .btn-outline{ background:transparent; color:var(--ink); border:1px solid var(--line); margin-top:8px; }
  .btn-danger{ background:transparent; color:var(--danger); border:1px solid #5A2E33; margin-top:8px; }
  .btn-sm{ width:auto; padding:7px 11px; font-size:12px; margin-top:0; }
  .btn-google svg{width:16px;height:16px;}

  .divider{ display:flex; align-items:center; gap:10px; margin:14px 0; color:var(--ink-dim); font-size:11px; }
  .divider::before, .divider::after{ content:""; flex:1; height:1px; background:var(--line); }
  .switch-mode{ text-align:center; margin-top:14px; font-size:12.5px; color:var(--ink-dim); }
  .switch-mode a{ color:var(--violet); text-decoration:none; font-weight:600; cursor:pointer; }

  .msg{ font-size:12px; padding:9px 11px; border-radius:9px; margin-bottom:10px; display:none; line-height:1.5; }
  .msg.show{ display:block; }
  .msg.error{ background:#3A1B1E; color:#FFB3B3; border:1px solid #5A2E33; }
  .msg.success{ background:#12332C; color:#9CEFDD; border:1px solid #2C6A5F; }

  /* ---- ①ギャラリー ---- */
  .gallery-toolbar{ display:flex; gap:8px; margin-bottom:14px; }
  .gallery-toolbar input{ flex:1; padding:10px 12px; background:var(--navy-2); border:1px solid var(--line); border-radius:10px; color:var(--ink); font-family:inherit; font-size:13px; }
  .gallery-toolbar button{ background:var(--violet); color:#1C1030; border:none; border-radius:10px; width:40px; font-size:18px; font-weight:800; cursor:pointer; }
  .gallery-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .gallery-item{
    background:var(--navy-2); border:1px solid var(--line); border-radius:12px;
    overflow:hidden; cursor:pointer;
  }
  .gallery-thumb{ width:100%; aspect-ratio:4/3; background:#0B1120; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .gallery-thumb img{ width:100%; height:100%; object-fit:cover; }
  .gallery-meta{ padding:8px 10px; }
  .gallery-title{ font-size:12.5px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .gallery-date{ font-size:10.5px; color:var(--ink-dim); font-family:'JetBrains Mono', monospace; }
  .gallery-type{ font-size:9.5px; color:var(--violet); font-family:'JetBrains Mono', monospace; }
  .top-actions{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .icon-btn{ background:var(--navy-2); border:1px solid var(--line); color:var(--ink); width:34px; height:34px; border-radius:10px; cursor:pointer; font-size:15px; }

  /* ---- ②2D描画エディタ ---- */
  .editor-wrap{ max-width:none; padding:10px; }
  .editor-top{ display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
  .editor-title-input{ flex:1; min-width:100px; background:var(--navy-2); border:1px solid var(--line); border-radius:9px; padding:8px 10px; color:var(--ink); font-family:inherit; font-size:13px; }
  .canvas-stage{
    position:relative; margin:0 auto 10px; background:#fff; border-radius:10px; overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.4); touch-action:none;
  }
  .canvas-stage canvas{ position:absolute; top:0; left:0; }
  .toolrow{ display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; margin-bottom:8px; }
  .tool-btn{
    flex-shrink:0; width:46px; height:46px; border-radius:11px; background:var(--navy-2);
    border:1px solid var(--line); color:var(--ink); font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .tool-btn.active{ background:var(--violet); color:#1C1030; border-color:var(--violet); }
  .subtool-row{ display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 12px; margin-bottom:8px; flex-wrap:wrap; }
  .subtool-row label{ font-size:11px; color:var(--ink-dim); }
  .subtool-row input[type=range]{ flex:1; min-width:80px; }
  .subtool-row input[type=color]{ width:34px; height:34px; border:none; border-radius:8px; background:none; padding:0; }
  .layers-panel{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px; margin-bottom:8px; }
  .layers-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .layers-header b{ font-size:12.5px; }
  .layer-row{
    display:flex; align-items:center; gap:8px; padding:7px 8px; background:var(--navy-2);
    border:1px solid var(--line); border-radius:9px; margin-bottom:6px; font-size:12px;
  }
  .layer-row.active{ border-color:var(--violet); }
  .layer-row span{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .layer-row button{ background:none; border:none; color:var(--ink-dim); cursor:pointer; font-size:13px; padding:2px 4px; }
  .bottom-actions{ display:flex; gap:8px; }
  .bottom-actions .btn{ margin-top:0; }

  /* ---- ③3Dエディタ ---- */
  .three-stage{ width:100%; aspect-ratio:4/3; border-radius:12px; overflow:hidden; background:#0B1120; margin-bottom:10px; }
  .prim-row{ display:flex; gap:8px; overflow-x:auto; margin-bottom:10px; }
  .prim-btn{ flex-shrink:0; padding:9px 12px; border-radius:10px; background:var(--navy-2); border:1px solid var(--line); color:var(--ink); font-size:12.5px; cursor:pointer; }
  .prim-btn.active{ background:var(--violet); color:#1C1030; border-color:var(--violet); }
  .obj-list{ max-height:120px; overflow-y:auto; margin-bottom:10px; }
  .obj-row{ display:flex; align-items:center; gap:8px; padding:7px 8px; background:var(--navy-2); border:1px solid var(--line); border-radius:9px; margin-bottom:6px; font-size:12px; cursor:pointer; }
  .obj-row.active{ border-color:var(--violet); }
  .obj-row span{ flex:1; }
  .transform-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-bottom:10px; }
  .transform-grid .field{ margin-bottom:0; }
  .transform-grid label{ font-size:10px; }
  .transform-grid input{ padding:8px; font-size:12px; }

  /* ---- ④アニメーション ---- */
  .anim-preview{ width:100%; aspect-ratio:4/3; background:#fff; border-radius:12px; margin-bottom:10px; overflow:hidden; position:relative; }
  .anim-preview canvas{ width:100%; height:100%; }
  .anim-controls{ display:flex; gap:8px; align-items:center; margin-bottom:10px; }
  .anim-controls button{ background:var(--navy-2); border:1px solid var(--line); color:var(--ink); width:40px; height:40px; border-radius:10px; font-size:16px; cursor:pointer; }
  .anim-controls input{ width:70px; padding:8px; background:var(--navy-2); border:1px solid var(--line); border-radius:9px; color:var(--ink); font-family:inherit; font-size:12px; }
  .frame-strip{ display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; margin-bottom:10px; }
  .frame-item{ flex-shrink:0; width:60px; text-align:center; cursor:pointer; }
  .frame-thumb{ width:60px; height:45px; background:#fff; border-radius:8px; border:2px solid var(--line); overflow:hidden; }
  .frame-item.active .frame-thumb{ border-color:var(--violet); }
  .frame-thumb img{ width:100%; height:100%; object-fit:cover; }
  .frame-num{ font-size:10px; color:var(--ink-dim); font-family:'JetBrains Mono', monospace; margin-top:2px; }

  .footnote{ text-align:center; color:var(--ink-dim); font-size:11px; margin-top:14px; opacity:.7; }

  /* ---- 3D設定パネル ---- */
  .panel-overlay{
    position:fixed; inset:0; background:rgba(8,12,24,.7); z-index:50;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .panel-sheet{
    width:100%; max-width:480px; max-height:82vh; background:var(--card);
    border-radius:20px 20px 0 0; padding:16px; overflow-y:auto; border:1px solid var(--line);
  }
  .panel-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .set-cat{ margin-bottom:14px; }
  .set-cat-title{
    font-size:10.5px; font-weight:700; color:var(--violet); letter-spacing:.06em; text-transform:uppercase;
    margin:0 0 6px 2px; font-family:'JetBrains Mono', monospace;
  }
  .set-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:9px 11px; background:var(--navy-2); border:1px solid var(--line);
    border-radius:11px; margin-bottom:6px; font-size:12.5px;
  }
  .set-row .desc{ font-size:10px; color:var(--ink-dim); margin-top:2px; }
  .set-row select, .set-row input[type=color]{
    background:var(--card); color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:5px 7px; font-family:inherit; font-size:11.5px;
  }
  .set-row input[type=range]{ width:90px; }
  .switch{
    position:relative; width:38px; height:22px; flex-shrink:0;
    background:#3A4470; border-radius:999px; cursor:pointer; border:none; transition:background .15s;
  }
  .switch.on{ background:var(--teal); }
  .switch::after{ content:""; position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:#fff; transition:transform .15s; }
  .switch.on::after{ transform:translateX(16px); }
  .obj-check{ width:16px; height:16px; }
</style>
</head>
<body>

<!-- ==== アカウント連携画面 ==== -->
<div id="linkScreen" class="screen">
  <div class="wrap">
    <div class="brand"><div class="mark">D</div><div><span>たいドロー</span><small>tai-draw</small></div></div>
    <div class="card">
      <h1>アカウントと連携</h1>
      <p class="sub">たいアカウントでログインすると、作品をクラウドに保存できるようになるよ。</p>
      <div id="linkMsg" class="msg"></div>
      <button class="btn btn-google" id="googleBtn">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M23.52 12.27c0-.85-.08-1.67-.22-2.45H12v4.64h6.47a5.53 5.53 0 0 1-2.4 3.63v3h3.87c2.27-2.09 3.58-5.17 3.58-8.82z"/><path fill="#34A853" d="M12 24c3.24 0 5.96-1.07 7.95-2.91l-3.87-3c-1.08.72-2.45 1.15-4.08 1.15-3.13 0-5.78-2.11-6.73-4.96H1.28v3.09A11.996 11.996 0 0 0 12 24z"/><path fill="#FBBC05" d="M5.27 14.28A7.2 7.2 0 0 1 4.89 12c0-.79.14-1.56.38-2.28V6.63H1.28A12 12 0 0 0 0 12c0 1.94.47 3.77 1.28 5.37l3.99-3.09z"/><path fill="#EA4335" d="M12 4.76c1.77 0 3.35.61 4.6 1.8l3.42-3.42C17.95 1.19 15.23 0 12 0 7.31 0 3.26 2.69 1.28 6.63l3.99 3.09C6.22 6.87 8.87 4.76 12 4.76z"/></svg>
        Googleで連携する
      </button>
      <div class="divider">または</div>
      <div class="field"><label>メールアドレス</label><input type="email" id="linkEmail" placeholder="you@example.com"></div>
      <div class="field"><label>パスワード</label><input type="password" id="linkPassword" placeholder="6文字以上"></div>
      <button class="btn btn-primary" id="linkLoginBtn">ログインして連携</button>
      <div class="switch-mode">アカウントがない？ <a id="toLinkSignup">新規登録</a></div>
    </div>
  </div>
</div>

<div id="linkSignupScreen" class="screen hidden">
  <div class="wrap">
    <div class="brand"><div class="mark">D</div><div><span>たいドロー</span><small>tai-draw</small></div></div>
    <div class="card">
      <h1>新規登録</h1>
      <p class="sub">たいアカウントセンターと共通のアカウントを作るよ。</p>
      <div id="linkSignupMsg" class="msg"></div>
      <div class="field"><label>表示名</label><input type="text" id="signupName" placeholder="ニックネーム"></div>
      <div class="field"><label>メールアドレス</label><input type="email" id="signupEmail" placeholder="you@example.com"></div>
      <div class="field"><label>パスワード</label><input type="password" id="signupPassword" placeholder="6文字以上"></div>
      <button class="btn btn-primary" id="signupBtn">登録する</button>
      <div class="switch-mode"><a id="toLinkLogin">ログインにもどる</a></div>
    </div>
  </div>
</div>

<!-- ==== ① ギャラリー画面 ==== -->
<div id="galleryScreen" class="screen hidden">
  <div class="wrap">
    <div class="brand"><div class="mark">D</div><div><span>たいドロー</span><small id="galleryGreeting">-</small></div></div>
    <div class="card">
      <div class="top-actions">
        <h1 style="margin:0;">さくひん一覧</h1>
        <button class="icon-btn" id="galleryLogoutBtn">⎋</button>
      </div>
      <div class="gallery-toolbar">
        <input type="text" id="gallerySearch" placeholder="🔍 タイトルで検索">
        <button id="galleryNewBtn">＋</button>
      </div>
      <div class="field" style="margin-bottom:12px;">
        <select id="folderFilter"><option value="">すべてのフォルダ</option></select>
      </div>
      <div id="galleryGrid" class="gallery-grid"></div>
      <p class="sub" id="galleryEmpty" style="margin-top:14px;">まだ作品がないよ。「＋」から新規作成してみて！</p>
    </div>
    <p class="footnote">tai-draw · powered by tai-account</p>
  </div>
</div>

<!-- ==== 新規作成モーダル ==== -->
<div id="newModal" class="screen hidden">
  <div class="wrap">
    <div class="card">
      <h1>新規作成</h1>
      <p class="sub">タイトルと種類を選んでね。</p>
      <div class="field"><label>タイトル</label><input type="text" id="newTitle" placeholder="むだい"></div>
      <div class="field">
        <label>種類</label>
        <select id="newType"><option value="drawing">2D イラスト</option><option value="animation">アニメーション</option></select>
      </div>
      <div class="field">
        <label>キャンバスサイズ</label>
        <select id="newSizePreset">
          <option value="480x360">小さめ(480×360・軽い)</option>
          <option value="800x600" selected>ふつう(800×600)</option>
          <option value="1200x900">大きめ(1200×900・重いかも)</option>
          <option value="custom">カスタム</option>
        </select>
      </div>
      <div id="customSizeFields" class="hidden" style="display:flex; gap:8px;">
        <div class="field" style="flex:1;"><label>幅(px)</label><input type="number" id="newCustomW" value="800"></div>
        <div class="field" style="flex:1;"><label>高さ(px)</label><input type="number" id="newCustomH" value="600"></div>
      </div>
      <div class="field"><label>フォルダ(任意)</label><input type="text" id="newFolder" placeholder="例: らくがき、しごと"></div>
      <button class="btn btn-primary" id="newCreateBtn">作成してひらく</button>
      <button class="btn btn-outline" id="newCancelBtn">キャンセル</button>
    </div>
  </div>
</div>

<!-- ==== ② 2D描画エディタ ==== -->
<div id="editorScreen" class="screen hidden">
  <div class="wrap editor-wrap">
    <div class="editor-top">
      <button class="icon-btn" id="editorBack">←</button>
      <input type="text" id="editorTitleInput" class="editor-title-input" placeholder="タイトル">
      <button class="icon-btn" id="editorTo3D" title="3Dへ">◆</button>
      <button class="icon-btn" id="editorToAnim" title="アニメーションへ">▶</button>
      <button class="icon-btn" id="editorSaveBtn" title="保存">💾</button>
    </div>

    <div id="canvasStage" class="canvas-stage" style="width:100%; max-width:480px; aspect-ratio:4/3;"></div>

    <div class="toolrow">
      <button class="tool-btn active" data-tool="pen" title="ペン">✎</button>
      <button class="tool-btn" data-tool="eraser" title="消しゴム">▱</button>
      <button class="tool-btn" data-tool="bucket" title="塗りつぶし">🪣</button>
      <button class="tool-btn" data-tool="eyedropper" title="スポイト">💧</button>
      <button class="tool-btn" data-tool="move" title="移動(レイヤーを動かす)">✥</button>
      <button class="tool-btn" data-tool="rect" title="四角形">▭</button>
      <button class="tool-btn" data-tool="circle" title="円">○</button>
      <button class="tool-btn" data-tool="text" title="テキスト">T</button>
      <button class="tool-btn" id="undoBtn" title="もどす">↶</button>
      <button class="tool-btn" id="redoBtn" title="すすむ">↷</button>
      <button class="tool-btn" id="importImgBtn" title="画像を読み込み">🖼</button>
      <button class="tool-btn" id="aiBtn" title="AI(近日対応)">🤖</button>
    </div>
    <input type="file" id="importImgFile" accept="image/*" class="hidden">
    <div id="urlImportRow" class="subtool-row hidden">
      <button class="btn btn-outline btn-sm" id="importImgFileBtn">📁 ファイルから</button>
      <input type="text" id="importImgUrl" placeholder="または画像のURLを貼り付け" style="flex:1; padding:9px 11px; background:var(--navy-2); border:1px solid var(--line); border-radius:9px; color:var(--ink);">
      <button class="btn btn-outline btn-sm" id="importImgUrlBtn">読み込む</button>
    </div>

    <div class="subtool-row">
      <input type="color" id="colorPicker" value="#222222">
      <label>太さ</label>
      <input type="range" id="sizeSlider" min="1" max="60" value="6">
      <span id="sizeLabel" class="mono" style="font-size:11px;">6</span>
    </div>

    <div class="layers-panel">
      <div class="layers-header">
        <b>レイヤー</b>
        <button class="icon-btn btn-sm" id="addLayerBtn">＋</button>
      </div>
      <div id="layerList"></div>
    </div>

    <div id="editorMsg" class="msg"></div>
  </div>
</div>

<!-- ==== ③ 3Dエディタ ==== -->
<div id="editor3DScreen" class="screen hidden">
  <div class="wrap">
    <div class="editor-top">
      <button class="icon-btn" id="editor3DBack">←</button>
      <h1 style="margin:0; font-size:16px;">3Dビュー</h1>
      <button class="icon-btn" id="open3DSettingsBtn" title="3D設定">⚙</button>
      <button class="icon-btn" id="convertTo2DBtn" title="2Dへ変換">▤</button>
    </div>
    <div id="threeStage" class="three-stage"></div>
    <div class="prim-row">
      <button class="prim-btn active" id="modeMoveBtn" data-mode="translate">✥ 移動</button>
      <button class="prim-btn" id="modeRotateBtn" data-mode="rotate">↻ 回転</button>
      <button class="prim-btn" id="modeScaleBtn" data-mode="scale">⤢ 拡大縮小</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import {
    getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    signOut, updateProfile, GoogleAuthProvider, signInWithPopup
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, deleteDoc, getDocs, collection, query, where,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDNKPM8KCe6RGWuaQOUDorBtjCD3IGoe1E",
    authDomain: "tai-account.firebaseapp.com",
    projectId: "tai-account",
    storageBucket: "tai-account.firebasestorage.app",
    messagingSenderId: "579819210756",
    appId: "1:579819210756:web:7eba19a9d4c2ac7697cd51"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const googleProvider = new GoogleAuthProvider();

  let CW = 480, CH = 360; // 現在開いてる作品のキャンバスサイズ(新規作成時に選べるよ)
  function setCanvasStageSize(w, h){
    const stage = document.getElementById('canvasStage');
    stage.style.aspectRatio = w + '/' + h;
  }

  // ================= 画面切り替え =================
  const screens = {
    link: document.getElementById('linkScreen'),
    linkSignup: document.getElementById('linkSignupScreen'),
    gallery: document.getElementById('galleryScreen'),
    newModal: document.getElementById('newModal'),
    editor: document.getElementById('editorScreen'),
    editor3d: document.getElementById('editor3DScreen'),
    anim: document.getElementById('animScreen'),
  };
  function showScreen(name){
    Object.values(screens).forEach(s => s.classList.add('hidden'));
    screens[name].classList.remove('hidden');
  }
  function setMsg(id, text, type){ const el = document.getElementById(id); el.textContent = text; el.className = 'msg show ' + type; }
  function clearMsg(id){ document.getElementById(id).className = 'msg'; }
  function friendlyError(err){
    const map = {
      'auth/invalid-email':'メールアドレスの形が正しくないよ','auth/user-not-found':'そのメールアドレスは登録されてないよ',
      'auth/wrong-password':'パスワードが違うよ','auth/invalid-credential':'メールアドレスかパスワードが違うよ',
      'auth/email-already-in-use':'そのメールアドレスはもう使われてるよ','auth/weak-password':'パスワードが簡単すぎるよ(6文字以上)',
      'auth/popup-closed-by-user':'ポップアップが閉じられちゃった'
    };
    return map[err.code] || (err.message || 'なにかエラーが起きたよ');
  }

  let currentUser = null;

  onAuthStateChanged(auth, (user) => {
    if (user) { currentUser = user; document.getElementById('galleryGreeting').textContent = 'tai-draw · ' + (user.displayName || user.email); loadGallery(); showScreen('gallery'); }
    else { currentUser = null; showScreen('link'); }
  });

  document.getElementById('googleBtn').addEventListener('click', async () => {
    clearMsg('linkMsg');
    try { await signInWithPopup(auth, googleProvider); } catch (err) { setMsg('linkMsg', friendlyError(err), 'error'); }
  });
  document.getElementById('linkLoginBtn').addEventListener('click', async () => {
    clearMsg('linkMsg');
    const email = document.getElementById('linkEmail').value.trim();
    const pw = document.getElementById('linkPassword').value;
    if (!email || !pw) { setMsg('linkMsg', 'メールアドレスとパスワードを入力してね。', 'error'); return; }
    try { await signInWithEmailAndPassword(auth, email, pw); } catch (err) { setMsg('linkMsg', friendlyError(err), 'error'); }
  });
  document.getElementById('toLinkSignup').addEventListener('click', () => showScreen('linkSignup'));
  document.getElementById('toLinkLogin').addEventListener('click', () => showScreen('link'));
  document.getElementById('signupBtn').addEventListener('click', async () => {
    clearMsg('linkSignupMsg');
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const pw = document.getElementById('signupPassword').value;
    if (!name || !email || !pw) { setMsg('linkSignupMsg', 'ぜんぶ入力してね。', 'error'); return; }
    if (pw.length < 6) { setMsg('linkSignupMsg', 'パスワードは6文字以上にしてね。', 'error'); return; }
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pw);
      await updateProfile(cred.user, { displayName: name });
      setDoc(doc(db, 'users', cred.user.uid), { displayName:name, email, lastLogin: serverTimestamp() }, { merge:true });
    } catch (err) { setMsg('linkSignupMsg', friendlyError(err), 'error'); }
  });
  document.getElementById('galleryLogoutBtn').addEventListener('click', () => signOut(auth));

  // ================= ① ギャラリー =================
  let galleryCache = [];
  async function loadGallery(){
    if (!currentUser) return;
    const q = query(collection(db, 'artworks'), where('ownerUid', '==', currentUser.uid));
    const snap = await getDocs(q);
    galleryCache = [];
    snap.forEach(d => galleryCache.push({ id: d.id, ...d.data() }));
    galleryCache.sort((a,b) => (b.updatedAtMs||0) - (a.updatedAtMs||0));
    renderGallery();
  }
  function renderGallery(filterText){
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = '';
    const folderVal = document.getElementById('folderFilter').value;
    // フォルダ選択肢を更新
    const folderSel = document.getElementById('folderFilter');
    const existing = new Set(Array.from(folderSel.options).map(o => o.value));
    const folders = [...new Set(galleryCache.map(a => a.folder).filter(Boolean))];
    folders.forEach(f => { if (!existing.has(f)) { const opt = document.createElement('option'); opt.value = f; opt.textContent = f; folderSel.appendChild(opt); } });

    let items = galleryCache.filter(a => !filterText || (a.title||'').includes(filterText));
    if (folderVal) items = items.filter(a => a.folder === folderVal);
    items.sort((a,b) => (b.favorite?1:0) - (a.favorite?1:0) || (b.updatedAtMs||0) - (a.updatedAtMs||0));
    document.getElementById('galleryEmpty').classList.toggle('hidden', items.length > 0);
    items.forEach(a => {
      const el = document.createElement('div');
      el.className = 'gallery-item';
      const dateStr = a.updatedAtMs ? new Date(a.updatedAtMs).toLocaleDateString('ja-JP') : '-';
      el.innerHTML = `
        <div class="gallery-thumb">${a.thumbnail ? `<img src="${a.thumbnail}">` : '🖼'}</div>
        <div class="gallery-meta">
          <div class="gallery-title">${a.favorite ? '⭐ ' : ''}${a.title || 'むだい'}</div>
          <div class="gallery-date">${dateStr}${a.folder ? ' ・ 📁' + a.folder : ''}</div>
          <div class="gallery-type">${a.type === 'animation' ? 'アニメーション' : '2D イラスト'}</div>
          <div style="display:flex; gap:4px; margin-top:6px;">
            <button class="icon-btn btn-sm" data-act="fav" style="width:28px;height:28px;font-size:12px;">⭐</button>
            <button class="icon-btn btn-sm" data-act="dup" style="width:28px;height:28px;font-size:12px;">⧉</button>
            <button class="icon-btn btn-sm" data-act="del" style="width:28px;height:28px;font-size:12px;">🗑</button>
          </div>
        </div>`;
      el.querySelector('.gallery-thumb').addEventListener('click', () => { if (a.type === 'animation') openAnimation(a); else openArtwork(a); });
      el.querySelector('.gallery-title').addEventListener('click', () => { if (a.type === 'animation') openAnimation(a); else openArtwork(a); });
      el.querySelector('[data-act="fav"]').addEventListener('click', async (ev) => {
        ev.stopPropagation();
        await setDoc(doc(db, 'artworks', a.id), { favorite: !a.favorite }, { merge:true });
        loadGallery();
      });
      el.querySelector('[data-act="dup"]').addEventListener('click', async (ev) => {
        ev.stopPropagation();
        const newId = 'art-' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
        const copy = { ...a, id:newId, title: a.title + ' のコピー', updatedAtMs: Date.now() };
        delete copy.updatedAt;
        await setDoc(doc(db, 'artworks', newId), copy);
        loadGallery();
      });
      el.querySelector('[data-act="del"]').addEventListener('click', async (ev) => {
        ev.stopPropagation();
        if (!confirm('この作品を削除する?元に戻せないよ。')) return;
        await deleteDoc(doc(db, 'artworks', a.id));
        loadGallery();
      });
      grid.appendChild(el);
    });
  }
  document.getElementById('folderFilter').addEventListener('change', () => renderGallery(document.getElementById('gallerySearch').value.trim()));
  document.getElementById('gallerySearch').addEventListener('input', (e) => renderGallery(e.target.value.trim()));
  document.getElementById('newSizePreset').addEventListener('change', (e) => {
    document.getElementById('customSizeFields').classList.toggle('hidden', e.target.value !== 'custom');
  });
  document.getElementById('galleryNewBtn').addEventListener('click', () => {
    document.getElementById('newTitle').value = '';
    document.getElementById('newType').value = 'drawing';
    showScreen('newModal');
  });
  document.getElementById('newCancelBtn').addEventListener('click', () => showScreen('gallery'));
  document.getElementById('newCreateBtn').addEventListener('click', async () => {
    const title = document.getElementById('newTitle').value.trim() || 'むだい';
    const type = document.getElementById('newType').value;
    const folder = document.getElementById('newFolder').value.trim();
    const preset = document.getElementById('newSizePreset').value;
    let w, h;
    if (preset === 'custom') { w = Number(document.getElementById('newCustomW').value) || 800; h = Number(document.getElementById('newCustomH').value) || 600; }
    else { [w, h] = preset.split('x').map(Number); }
    CW = w; CH = h;
    const id = 'art-' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    if (type === 'drawing') {
      const artwork = { id, ownerUid: currentUser.uid, title, type:'drawing', folder, canvasW:w, canvasH:h, layers:[{ name:'レイヤー1', visible:true, dataURL:null }], thumbnail:null, favorite:false, updatedAtMs: Date.now() };
      openArtwork(artwork, true);
    } else {
      const blank = blankLayerDataURL();
      const artwork = { id, ownerUid: currentUser.uid, title, type:'animation', folder, canvasW:w, canvasH:h, frames:[blank], fps:30, thumbnail:null, favorite:false, updatedAtMs: Date.now() };
      openAnimation(artwork, true);
    }
  });

  function blankLayerDataURL(){
    const c = document.createElement('canvas'); c.width = CW; c.height = CH;
    const ctx = c.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0,0,CW,CH);
    return c.toDataURL('image/png');
  }

  function openArtwork(a, isNew){
    currentArtwork = { id:a.id, title:a.title||'むだい', type:'drawing', folder:a.folder||'', favorite:a.favorite||false };
    CW = a.canvasW || 480; CH = a.canvasH || 360;
    setCanvasStageSize(CW, CH);
    document.getElementById('editorTitleInput').value = currentArtwork.title;
    const layersData = (a.layers && a.layers.length) ? a.layers : [{ name:'レイヤー1', visible:true, dataURL:blankLayerDataURL() }];
    editorContext = { mode:'artwork' };
    initEditor(layersData);
    showScreen('editor');
  }
  function openAnimation(a, isNew){
    CW = a.canvasW || 480; CH = a.canvasH || 360;
    currentAnimation = { id:a.id, title:a.title||'むだい', folder:a.folder||'', favorite:a.favorite||false, frames: a.frames && a.frames.length ? a.frames.slice() : [blankLayerDataURL()], fps: a.fps || 30 };
    animFrameIndex = 0;
    document.getElementById('animTitleInput').value = currentAnimation.title;
    document.getElementById('animFps').value = currentAnimation.fps;
    renderFrameStrip();
    drawAnimPreviewFrame(0);
    showScreen('anim');
  }

  // ================= ② 2D描画エディタ =================
  let currentArtwork = null;
  let editorContext = { mode:'artwork' }; // {mode:'artwork'} または {mode:'frame', animId, frameIndex}
  let layers = []; // [{name, visible, canvas}]
  let activeLayerIndex = 0;
  let tool = 'pen';
  let brushColor = '#222222';
  let brushSize = 6;
  let history = []; let historyIndex = -1;
  let isDrawing = false;
  let moveStart = null; let moveLayerSnapshot = null;
  let stageEl = document.getElementById('canvasStage');
  let overlayCanvas, overlayCtx;
  let shapeStart = null;

  function initEditor(layersData){
    stageEl.innerHTML = '';
    layers = layersData.map(l => {
      const c = document.createElement('canvas'); c.width = CW; c.height = CH;
      const ctx = c.getContext('2d');
      if (l.dataURL) { const img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0, CW, CH); img.src = l.dataURL; }
      else { ctx.fillStyle = '#fff'; ctx.fillRect(0,0,CW,CH); }
      c.style.width = '100%'; c.style.height = '100%'; c.style.display = l.visible === false ? 'none' : 'block';
      return { name: l.name || 'レイヤー', visible: l.visible !== false, canvas: c, ctx };
    });
    layers.forEach(l => stageEl.appendChild(l.canvas));
    overlayCanvas = document.createElement('canvas'); overlayCanvas.width = CW; overlayCanvas.height = CH;
    overlayCanvas.style.width = '100%'; overlayCanvas.style.height = '100%';
    stageEl.appendChild(overlayCanvas);
    overlayCtx = overlayCanvas.getContext('2d');
    activeLayerIndex = layers.length - 1;
    history = []; historyIndex = -1;
    pushHistory();
    renderLayerList();
    bindCanvasEvents();
  }

  function bindCanvasEvents(){
    overlayCanvas.onpointerdown = onPointerDown;
    overlayCanvas.onpointermove = onPointerMove;
    overlayCanvas.onpointerup = onPointerUp;
    overlayCanvas.onpointerleave = onPointerUp;
  }
  function getPos(e){
    const rect = overlayCanvas.getBoundingClientRect();
    return { x: (e.clientX - rect.left) / rect.width * CW, y: (e.clientY - rect.top) / rect.height * CH };
  }
  function activeCtx(){ return layers[activeLayerIndex].ctx; }

  function onPointerDown(e){
    overlayCanvas.setPointerCapture(e.pointerId);
    const p = getPos(e);
    if (tool === 'eyedropper') {
      const d = activeCtx().getImageData(Math.floor(p.x), Math.floor(p.y), 1, 1).data;
      brushColor = '#' + [d[0],d[1],d[2]].map(v => v.toString(16).padStart(2,'0')).join('');
      document.getElementById('colorPicker').value = brushColor;
      tool = 'pen'; setActiveToolBtn('pen');
      return;
    }
    if (tool === 'bucket') { floodFill(activeCtx(), Math.floor(p.x), Math.floor(p.y), brushColor); pushHistory(); return; }
    if (tool === 'text') {
      const t = prompt('テキストを入力してね');
      if (t) { activeCtx().fillStyle = brushColor; activeCtx().font = (brushSize*3) + 'px sans-serif'; activeCtx().fillText(t, p.x, p.y); pushHistory(); }
      return;
    }
    isDrawing = true; shapeStart = p;
    if (tool === 'move') {
      moveStart = p;
      const c = document.createElement('canvas'); c.width = CW; c.height = CH;
      c.getContext('2d').drawImage(layers[activeLayerIndex].canvas, 0, 0);
      moveLayerSnapshot = c;
      return;
    }
    if (tool === 'pen' || tool === 'eraser') {
      const ctx = activeCtx();
      ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.lineWidth = brushSize;
      ctx.globalCompositeOperation = tool === 'eraser' ? 'destination-out' : 'source-over';
      ctx.strokeStyle = brushColor;
      ctx.beginPath(); ctx.moveTo(p.x, p.y);
    }
  }
  function onPointerMove(e){
    if (!isDrawing) return;
    const p = getPos(e);
    if (tool === 'move') {
      const dx = p.x - moveStart.x, dy = p.y - moveStart.y;
      const ctx = activeCtx();
      ctx.clearRect(0,0,CW,CH);
      ctx.drawImage(moveLayerSnapshot, dx, dy);
      return;
    }
    if (tool === 'pen' || tool === 'eraser') {
      const ctx = activeCtx(); ctx.lineTo(p.x, p.y); ctx.stroke();
    } else if (tool === 'rect' || tool === 'circle') {
      overlayCtx.clearRect(0,0,CW,CH);
      overlayCtx.strokeStyle = brushColor; overlayCtx.lineWidth = brushSize;
      overlayCtx.beginPath();
      if (tool === 'rect') overlayCtx.strokeRect(shapeStart.x, shapeStart.y, p.x - shapeStart.x, p.y - shapeStart.y);
      else { const r = Math.hypot(p.x - shapeStart.x, p.y - shapeStart.y); overlayCtx.arc(shapeStart.x, shapeStart.y, r, 0, Math.PI*2); overlayCtx.stroke(); }
    }
  }
  function onPointerUp(e){
    if (!isDrawing) return;
    isDrawing = false;
    if (tool === 'rect' || tool === 'circle') {
      const p = getPos(e); const ctx = activeCtx();
      ctx.strokeStyle = brushColor; ctx.lineWidth = brushSize; ctx.beginPath();
      if (tool === 'rect') ctx.strokeRect(shapeStart.x, shapeStart.y, p.x - shapeStart.x, p.y - shapeStart.y);
      else { const r = Math.hypot(p.x - shapeStart.x, p.y - shapeStart.y); ctx.arc(shapeStart.x, shapeStart.y, r, 0, Math.PI*2); ctx.stroke(); }
      overlayCtx.clearRect(0,0,CW,CH);
    }
    pushHistory();
  }

  function floodFill(ctx, x, y, hexColor){
    const img = ctx.getImageData(0,0,CW,CH); const data = img.data;
    const idx = (y*CW+x)*4;
    const target = [data[idx], data[idx+1], data[idx+2], data[idx+3]];
    const r = parseInt(hexColor.slice(1,3),16), g = parseInt(hexColor.slice(3,5),16), b = parseInt(hexColor.slice(5,7),16);
    if (target[0]===r && target[1]===g && target[2]===b) return;
    const stack = [[x,y]];
    while (stack.length) {
      const [cx, cy] = stack.pop();
      if (cx<0||cy<0||cx>=CW||cy>=CH) continue;
      const i = (cy*CW+cx)*4;
      if (data[i]!==target[0]||data[i+1]!==target[1]||data[i+2]!==target[2]||data[i+3]!==target[3]) continue;
      data[i]=r; data[i+1]=g; data[i+2]=b; data[i+3]=255;
      stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
    }
    ctx.putImageData(img, 0, 0);
  }

  document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
    btn.addEventListener('click', () => { tool = btn.dataset.tool; setActiveToolBtn(tool); });

  function setActiveToolBtn(t){ document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.toggle('active', b.dataset.tool === t)); }

  function addImageAsLayer(src, isExternalUrl){
    const img = new Image();
    if (isExternalUrl) img.crossOrigin = 'anonymous';
    img.onload = () => {
      const c = document.createElement('canvas'); c.width = CW; c.height = CH; c.style.width='100%'; c.style.height='100%';
      const ctx = c.getContext('2d');
      // アスペクト比を保ってキャンバスに収める
      const scale = Math.min(CW / img.width, CH / img.height);
      const dw = img.width * scale, dh = img.height * scale;
      ctx.drawImage(img, (CW-dw)/2, (CH-dh)/2, dw, dh);
      stageEl.insertBefore(c, overlayCanvas);
      layers.push({ name:'読み込んだ画像', visible:true, canvas:c, ctx });
      activeLayerIndex = layers.length - 1;
      renderLayerList(); pushHistory();
      document.getElementById('urlImportRow').classList.add('hidden');
      document.getElementById('importImgUrl').value = '';
    };
    img.onerror = () => setMsg('editorMsg', 'この画像は読み込めなかったよ(URLがCORSでブロックされてるかも)。', 'error');
    img.src = src;
  }

  function pushHistory(){
    const snapshot = layers.map(l => ({ name: l.name, visible: l.visible, dataURL: l.canvas.toDataURL('image/png') }));
    history = history.slice(0, historyIndex + 1);
    history.push(snapshot);
    if (history.length > 15) history.shift();
    historyIndex = history.length - 1;
  }
  function restoreHistory(snapshot){
    snapshot.forEach((l, i) => {
      if (!layers[i]) return;
      const img = new Image();
      img.onload = () => { layers[i].ctx.clearRect(0,0,CW,CH); layers[i].ctx.drawImage(img,0,0,CW,CH); };
      img.src = l.dataURL;
      layers[i].visible = l.visible; layers[i].canvas.style.display = l.visible ? 'block' : 'none';
    });
    renderLayerList();
  }

  function renderLayerList(){
    const list = document.getElementById('layerList');
    list.innerHTML = '';
    layers.forEach((l, i) => {
      const row = document.createElement('div');
      row.className = 'layer-row' + (i === activeLayerIndex ? ' active' : '');
      row.innerHTML = `<button data-act="vis">${l.visible ? '👁' : '🚫'}</button><span>${l.name}</span><button data-act="up">↑</button><button data-act="down">↓</button><button data-act="del">🗑</button>`;
      row.addEventListener('click', (e) => { if (e.target.tagName !== 'BUTTON') { activeLayerIndex = i; renderLayerList(); } });
      row.querySelector('[data-act="vis"]').addEventListener('click', () => { l.visible = !l.visible; l.canvas.style.display = l.visible ? 'block' : 'none'; renderLayerList(); });
      row.querySelector('[data-act="up"]').addEventListener('click', () => moveLayer(i, -1));
      row.querySelector('[data-act="down"]').addEventListener('click', () => moveLayer(i, 1));

  function moveLayer(i, dir){

    [layers[i], layers[j]] = [layers[j], layers[i]];
    layers.forEach(l => stageEl.insertBefore(l.canvas, overlayCanvas));
    if (activeLayerIndex === i) activeLayerIndex = j; else if (activeLayerIndex === j) activeLayerIndex = i;

  let threeScene, threeCamera, threeRenderer, threeControls, threeTransform, threeGrid, threeObjects = [], selectedObjIndex = -1;
  let threeLight, threeAmbient, threeAxes = null;
  let fpsFrames = 0, fpsLast = performance.now();
  function initThree(){
    const stage = document.getElementById('threeStage');
    stage.innerHTML = '';
    const w = stage.clientWidth, h = stage.clientHeight;
    threeScene = new THREE.Scene(); threeScene.background = new THREE.Color(sceneSettings.bg);
    threeCamera = new THREE.PerspectiveCamera(50, w/h, 0.1, 1000); threeCamera.position.set(4,4,6);
    threeRenderer = new THREE.WebGLRenderer({ antialias:true, preserveDrawingBuffer:true });
    threeRenderer.setSize(w, h); stage.appendChild(threeRenderer.domElement);
    const fpsEl = document.createElement('div');
    fpsEl.id = 'fpsCounter'; fpsEl.className = 'mono hidden';
    fpsEl.style.cssText = 'position:absolute; top:6px; left:6px; color:#48D8C7; font-size:11px; background:rgba(0,0,0,.4); padding:2px 6px; border-radius:6px;';
    stage.style.position = 'relative'; stage.appendChild(fpsEl);
    threeControls = new THREE.OrbitControls(threeCamera, threeRenderer.domElement);
    threeLight = new THREE.DirectionalLight(sceneSettings.lightColor, sceneSettings.lightIntensity); threeLight.position.set(5,8,5); threeScene.add(threeLight);
    threeAmbient = new THREE.AmbientLight(0x808080, sceneSettings.ambientIntensity); threeScene.add(threeAmbient);
    const gridVal = Number(document.getElementById('gridSizeSlider').value) || 10;
    threeGrid = new THREE.GridHelper(gridVal, gridVal, sceneSettings.gridColor, 0x2C3760);
    threeScene.add(threeGrid);
    if (sceneSettings.axes) { threeAxes = new THREE.AxesHelper(3); threeScene.add(threeAxes); }
    if (sceneSettings.starryBg) toggleStars(true);

    // 変形ギズモ(移動/回転/拡大縮小をドラッグで直接操作)
    threeTransform = new THREE.TransformControls(threeCamera, threeRenderer.domElement);
    threeTransform.setMode('translate');
    threeTransform.addEventListener('dragging-changed', (ev) => {
      threeControls.enabled = !ev.value;
      if (!ev.value && sceneSettings.snap && selectedObjIndex >= 0) {
        const p = threeObjects[selectedObjIndex].mesh.position;
        p.set(Math.round(p.x*2)/2, Math.round(p.y*2)/2, Math.round(p.z*2)/2);
        syncTransformInputs();
      }
    });
    threeTransform.addEventListener('objectChange', syncTransformInputs);
    threeScene.add(threeTransform);

    threeObjects = []; selectedObjIndex = -1;
    let turntableAngle = 0;
    (function animate(){
      requestAnimationFrame(animate);
      threeControls.update();
      const t = performance.now() * 0.001;
      threeObjects.forEach(o => {
        if (o.animRotate) o.mesh.rotation.y += 0.02;
        if (o.animBounce) o.mesh.position.y = (o.baseY||0.5) + Math.abs(Math.sin(t*3)) * 0.4;
        if (o.animFlicker && o.mesh.material) o.mesh.material.opacity = 0.4 + Math.abs(Math.sin(t*4)) * 0.6, o.mesh.material.transparent = true;
      });
      if (sceneSettings.turntable) {
        turntableAngle += 0.005;
        const r = 8;
        threeCamera.position.x = Math.sin(turntableAngle) * r;
        threeCamera.position.z = Math.cos(turntableAngle) * r;
        threeCamera.lookAt(0,0,0);
      }
      threeRenderer.render(threeScene, threeCamera);
      fpsFrames++;
      const now = performance.now();
      if (now - fpsLast > 500) {
        const fps = Math.round(fpsFrames / ((now - fpsLast)/1000));
        const el = document.getElementById('fpsCounter'); if (el) el.textContent = fps + ' FPS';
        fpsFrames = 0; fpsLast = now;
      }
    })();
  }

      const o = actx.createOscillator(); const g = actx.createGain();
      o.type = 'sine'; o.frequency.value = 660;

      g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.15);
      o.connect(g); g.connect(actx.destination);
      o.start(); o.stop(actx.currentTime + 0.15);

      { key:'lightIntensity', label:'ライトの強さ', type:'range', min:0, max:3, step:0.1, real:true },
      { key:'ambientIntensity', label:'環境光の強さ', type:'range', min:0, max:2, step:0.1, real:true },
      { key:'starryBg', label:'星空の背景', type:'toggle', real:true },
    ]},
    { cat:'配置サポート', items:[
      { key:'snap', label:'グリッドにスナップする', type:'toggle', real:true },
      { key:'randomPlace', label:'選択中を全部ランダム配置', type:'button', real:true },
      { key:'centerObj', label:'選択中を中央へ', type:'button', real:true },
      { key:'groundAlign', label:'選択中を地面に接地', type:'button', real:true },
      { key:'resetRotation', label:'選択中の回転をリセット', type:'button', real:true },
      { key:'deselect', label:'選択解除', type:'button', real:true },
    ]},
    { cat:'アニメーション', items:[
      { key:'animRotate', label:'選択中をずっと自転させる', type:'toggle', real:true },
      { key:'animBounce', label:'選択中をバウンドさせる', type:'toggle', real:true },
      { key:'animFlicker', label:'選択中を明滅させる', type:'toggle', real:true },
      { key:'turntable', label:'カメラが自動でぐるぐる回る', type:'toggle', real:true },
    ]},
    { cat:'マテリアル(選択中に適用)', items:[
      { key:'opacity', label:'不透明度', type:'range', min:0, max:1, step:0.05, real:true },
      { key:'wireframe', label:'ワイヤーフレーム表示', type:'toggle', real:true },
      { key:'metalness', label:'金属っぽさ', type:'range', min:0, max:1, step:0.05, real:true },
      { key:'roughness', label:'表面のザラつき', type:'range', min:0, max:1, step:0.05, real:true },
      { key:'emissive', label:'発光色', type:'color', real:true },
    ]},
    { cat:'シーン管理', items:[
      { key:'exportJson', label:'シーンをJSONで書き出す', type:'button', real:true },
      { key:'importJson', label:'シーンをJSONから読み込む', type:'button', real:true },
      { key:'soundOn', label:'操作音を鳴らす', type:'toggle', real:true },
    ]},
    { cat:'おまけ(近日対応)', items:[
      { key:'textureUrl', label:'画像テクスチャを貼る(URL)', type:'text', real:false, desc:'簡易対応・CORSでブロックされる画像もあるよ' },
      { key:'physicsFall', label:'物理っぽく落下させる', type:'toggle', real:false, desc:'準備中' },
      { key:'particleTrail', label:'パーティクルの軌跡', type:'toggle', real:false, desc:'準備中' },
      { key:'mirrorCopy', label:'左右反転コピー', type:'button', real:false, desc:'準備中' },
      { key:'boolUnion', label:'オブジェクト同士を合体', type:'button', real:false, desc:'準備中(ブーリアン演算)' },
      { key:'exportGlb', label:'.glbファイルで書き出す', type:'button', real:false, desc:'準備中' },
      { key:'importGlb', label:'.glbファイルを読み込む', type:'button', real:false, desc:'準備中' },
      { key:'vrView', label:'VRで見る', type:'button', real:false, desc:'準備中' },
      { key:'collabEdit', label:'友達と同時編集', type:'toggle', real:false, desc:'準備中' },
      { key:'sceneTemplates', label:'シーンのテンプレート', type:'button', real:false, desc:'準備中' },
    ]},
  ];

  document.getElementById('open3DSettingsBtn').addEventListener('click', () => { renderSettings3D(); document.getElementById('settings3DOverlay').classList.remove('hidden'); });
  document.getElementById('close3DSettingsBtn').addEventListener('click', () => document.getElementById('settings3DOverlay').classList.add('hidden'));

  function renderSettings3D(){
    const root = document.getElementById('settings3DScroll');
    root.innerHTML = '';
    SETTINGS3D_SCHEMA.forEach(cat => {
      const catEl = document.createElement('div'); catEl.className = 'set-cat';
      const title = document.createElement('div'); title.className = 'set-cat-title'; title.textContent = cat.cat;
      catEl.appendChild(title);
      cat.items.forEach(it => {
        const row = document.createElement('div'); row.className = 'set-row';
        const currentVal = getSettingValue(it.key);
        if (it.type === 'toggle') {
          row.innerHTML = `<div><div>${it.label}</div>${it.desc ? `<div class="desc">${it.desc}</div>` : ''}</div>`;
          const sw = document.createElement('button');
          sw.className = 'switch' + (currentVal ? ' on' : '');
          sw.addEventListener('click', () => { const v = !getSettingValue(it.key); setSettingValue(it.key, v); sw.classList.toggle('on', v); if (it.real) apply3DSetting(it.key, v); });
          row.appendChild(sw);
        } else if (it.type === 'range') {
          row.innerHTML = `<div>${it.label}</div>`;
          const input = document.createElement('input');
          input.type = 'range'; input.min = it.min; input.max = it.max; input.step = it.step; input.value = currentVal;
          input.addEventListener('input', () => { setSettingValue(it.key, Number(input.value)); if (it.real) apply3DSetting(it.key, Number(input.value)); });
          row.appendChild(input);
        } else if (it.type === 'color') {
          row.innerHTML = `<div>${it.label}</div>`;
          const input = document.createElement('input');
          input.type = 'color'; input.value = currentVal || '#48D8C7';
          input.addEventListener('input', () => { setSettingValue(it.key, input.value); if (it.real) apply3DSetting(it.key, input.value); });
          row.appendChild(input);
        } else if (it.type === 'text') {
          row.innerHTML = `<div>${it.label}${it.desc ? `<div class="desc">${it.desc}</div>` : ''}</div>`;
          const input = document.createElement('input');
          input.type = 'text'; input.style.width = '100px'; input.placeholder = 'https://...';
          input.addEventListener('change', () => { if (it.real) apply3DSetting(it.key, input.value); });
          row.appendChild(input);
        } else if (it.type === 'button') {
          row.innerHTML = `<div>${it.label}${it.desc ? `<div class="desc">${it.desc}</div>` : ''}</div>`;
          const btn = document.createElement('button');
          btn.className = 'prim-btn'; btn.textContent = it.real ? '実行' : '準備中';
          btn.addEventListener('click', () => { if (it.real) apply3DSetting(it.key); else alert('この機能は近日対応予定だよ!'); });
          row.appendChild(btn);
        }
        catEl.appendChild(row);
      });
      root.appendChild(catEl);
    });
  }

  function getSettingValue(key){
    if (['opacity','wireframe','metalness','roughness','emissive','animRotate','animBounce','animFlicker'].includes(key)) {
      if (selectedObjIndex < 0) return key === 'opacity' ? 1 : (key === 'metalness' || key === 'roughness' ? 0 : (key==='emissive' ? '#000000' : false));
      const o = threeObjects[selectedObjIndex];
      if (key === 'opacity') return o.mesh.material ? o.mesh.material.opacity : 1;
      if (key === 'wireframe') return o.mesh.material ? !!o.mesh.material.wireframe : false;
      if (key === 'metalness') return o.mesh.material ? (o.mesh.material.metalness||0) : 0;
      if (key === 'roughness') return o.mesh.material ? (o.mesh.material.roughness!==undefined?o.mesh.material.roughness:1) : 1;
      if (key === 'emissive') return o.mesh.material && o.mesh.material.emissive ? '#'+o.mesh.material.emissive.getHexString() : '#000000';
      return o[key] || false;
    }
    return sceneSettings[key];
  }
  function setSettingValue(key, val){
    if (['opacity','wireframe','metalness','roughness','emissive','animRotate','animBounce','animFlicker'].includes(key)) {
      if (selectedObjIndex < 0) return;
      threeObjects[selectedObjIndex][key] = val;
      return;
    }
    sceneSettings[key] = val;
  }

  function apply3DSetting(key, val){
    const cam = threeCamera, sc = threeScene;
    switch(key){
      case 'bg': sc.background = new THREE.Color(val); break;
      case 'gridColor':
        if (threeGrid) { sc.remove(threeGrid); const gv = Number(document.getElementById('gridSizeSlider').value)||10; threeGrid = new THREE.GridHelper(gv, gv, val, 0x2C3760); sc.add(threeGrid); }
        break;
      case 'highlightColor':
        if (threeTransform && threeTransform.getHelper) { /* r128では非対応のことがあるので握りつぶす */ }
        break;
      case 'axes':
        if (threeAxes) sc.remove(threeAxes);
        if (val) { threeAxes = new THREE.AxesHelper(3); sc.add(threeAxes); } else threeAxes = null;
        break;
      case 'fps': document.getElementById('fpsCounter').classList.toggle('hidden', !val); break;
      case 'fogOn': sc.fog = val ? new THREE.Fog(sceneSettings.fogColor, 3, 20) : null; break;
      case 'fogColor': if (sc.fog) sc.fog.color.set(val); break;
      case 'ortho': switchCameraProjection(val); break;
      case 'shadow': toggleShadows(val); break;
      case 'viewFront': cam.position.set(0,1.5,7); threeControls.target.set(0,0,0); break;
      case 'viewTop': cam.position.set(0,8,0.01); threeControls.target.set(0,0,0); break;
      case 'viewSide': cam.position.set(7,1.5,0); threeControls.target.set(0,0,0); break;
      case 'viewIso': cam.position.set(4,4,6); threeControls.target.set(0,0,0); break;
      case 'resetZoom': cam.position.set(4,4,6); threeControls.target.set(0,0,0); break;
      case 'fullscreen': document.getElementById('threeStage').requestFullscreen?.(); break;
      case 'lightColor': if (threeLight) threeLight.color.set(val); break;
      case 'lightIntensity': if (threeLight) threeLight.intensity = val; break;
      case 'ambientIntensity': if (threeAmbient) threeAmbient.intensity = val; break;
      case 'starryBg': toggleStars(val); break;
      case 'turntable': break; // animate()ループ内で参照される
      case 'randomPlace':
        if (selectedObjIndex >= 0) { const m = threeObjects[selectedObjIndex].mesh; m.position.set((Math.random()-0.5)*6, Math.random()*3, (Math.random()-0.5)*6); syncTransformInputs(); }
        break;
      case 'centerObj':
        if (selectedObjIndex >= 0) { threeObjects[selectedObjIndex].mesh.position.set(0, threeObjects[selectedObjIndex].mesh.position.y, 0); syncTransformInputs(); }
        break;
      case 'groundAlign':
        if (selectedObjIndex >= 0) { threeObjects[selectedObjIndex].mesh.position.y = 0.5; syncTransformInputs(); }
        break;
      case 'resetRotation':
        if (selectedObjIndex >= 0) { threeObjects[selectedObjIndex].mesh.rotation.set(0,0,0); syncTransformInputs(); }
        break;
      case 'deselect':
        threeTransform.detach(); selectedObjIndex = -1; renderObjList();
        break;
      case 'opacity':
        if (selectedObjIndex >= 0 && threeObjects[selectedObjIndex].mesh.material) {
          const mat = threeObjects[selectedObjIndex].mesh.material; mat.transparent = val < 1; mat.opacity = val;
        }
        break;
      case 'wireframe':
        if (selectedObjIndex >= 0 && threeObjects[selectedObjIndex].mesh.material) threeObjects[selectedObjIndex].mesh.material.wireframe = val;
        break;
      case 'metalness':
        if (selectedObjIndex >= 0 && threeObjects[selectedObjIndex].mesh.material) threeObjects[selectedObjIndex].mesh.material.metalness = val;
        break;
      case 'roughness':
        if (selectedObjIndex >= 0 && threeObjects[selectedObjIndex].mesh.material) threeObjects[selectedObjIndex].mesh.material.roughness = val;
        break;
      case 'emissive':
        if (selectedObjIndex >= 0 && threeObjects[selectedObjIndex].mesh.material && threeObjects[selectedObjIndex].mesh.material.emissive) threeObjects[selectedObjIndex].mesh.material.emissive.set(val);
        break;
      case 'exportJson': exportScene(); break;
      case 'importJson': importScene(); break;
      case 'soundOn': break;
      case 'textureUrl':
        if (selectedObjIndex >= 0 && val) {
          const loader = new THREE.TextureLoader();
          loader.load(val, (tex) => { threeObjects[selectedObjIndex].mesh.material.map = tex; threeObjects[selectedObjIndex].mesh.material.needsUpdate = true; },
            undefined, () => setMsg('editor3DMsg', 'テクスチャを読み込めなかったよ(CORSかも)。', 'error'));
        }
        break;
    }
    if (['randomPlace','centerObj','groundAlign','resetRotation','opacity','wireframe','metalness','roughness','emissive'].includes(key)) playBeep();
  }

  function switchCameraProjection(ortho){
    const stage = document.getElementById('threeStage');
    const w = stage.clientWidth, h = stage.clientHeight;
    if (ortho) {
      const d = 5;
      threeCamera = new THREE.OrthographicCamera(-d*w/h, d*w/h, d, -d, 0.1, 1000);
    } else {
      threeCamera = new THREE.PerspectiveCamera(50, w/h, 0.1, 1000);
    }
    threeCamera.position.set(4,4,6);
    threeControls.object = threeCamera;
    threeTransform.camera = threeCamera;
  }
  function toggleShadows(on){
    threeRenderer.shadowMap.enabled = on;
    if (threeLight) threeLight.castShadow = on;
    threeObjects.forEach(o => { o.mesh.castShadow = on; o.mesh.receiveShadow = on; });
  }
  let threeStars = null;
  function toggleStars(on){
    if (threeStars) { threeScene.remove(threeStars); threeStars = null; }
    if (on) {
      const geo = new THREE.BufferGeometry();
      const positions = [];
      for (let i = 0; i < 400; i++) positions.push((Math.random()-0.5)*40, Math.random()*20, (Math.random()-0.5)*40);
      geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      threeStars = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.08 }));
      threeScene.add(threeStars);
    }
  }
  function exportScene(){
    const data = threeObjects.filter(o => !o.isGroup).map(o => ({
      name:o.name, position:o.mesh.position.toArray(), rotation:[o.mesh.rotation.x,o.mesh.rotation.y,o.mesh.rotation.z],
      scale:o.mesh.scale.toArray(), color: o.mesh.material && o.mesh.material.color ? '#'+o.mesh.material.color.getHexString() : '#48D8C7',
      geoType: o.mesh.geometry.type
    }));
    const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob); const a = document.createElement('a');
    a.href = url; a.download = 'tai-draw-scene.json'; a.click(); URL.revokeObjectURL(url);
  }
  function importScene(){
    const input = document.createElement('input'); input.type = 'file'; input.accept = 'application/json';
    input.onchange = (e) => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          data.forEach(d => {
            let geo;
            const t = d.geoType;
            if (t === 'BoxGeometry') geo = new THREE.BoxGeometry(1,1,1);
            else if (t === 'SphereGeometry') geo = new THREE.SphereGeometry(0.6,24,24);
            else if (t === 'CylinderGeometry') geo = new THREE.CylinderGeometry(0.5,0.5,1,24);
            else if (t === 'ConeGeometry') geo = new THREE.ConeGeometry(0.6,1,24);
            else if (t === 'TorusGeometry') geo = new THREE.TorusGeometry(0.5,0.2,16,32);
            else if (t === 'PlaneGeometry') geo = new THREE.PlaneGeometry(1.2,1.2);
            else geo = new THREE.RingGeometry(0.3,0.6,32);
            const mat = new THREE.MeshStandardMaterial({ color:d.color, side:THREE.DoubleSide });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.fromArray(d.position); mesh.rotation.set(...d.rotation); mesh.scale.fromArray(d.scale);
            addMeshObject(mesh, d.name || 'よみこみ');
          });
        } catch(err) { setMsg('editor3DMsg', '読み込めなかった: ' + err.message, 'error'); }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  document.getElementById('editorTo3D').addEventListener('click', () => { showScreen('editor3d'); initThree(); });
  document.getElementById('editor3DBack').addEventListener('click', () => showScreen('editor'));
  document.getElementById('convertTo2DBtn').addEventListener('click', () => {
    clearMsg('editor3DMsg');
    // ギズモとグリッドが映り込まないよう、キャプチャ中だけ隠す
    threeTransform.visible = false; threeGrid.visible = false;
    threeRenderer.render(threeScene, threeCamera);
    const dataURL = threeRenderer.domElement.toDataURL('image/png');
    threeTransform.visible = true; threeGrid.visible = true;
    const c = document.createElement('canvas'); c.width = CW; c.height = CH; c.style.width='100%'; c.style.height='100%';
    stageEl.insertBefore(c, overlayCanvas);
    const ctx = c.getContext('2d');
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, 0, 0, CW, CH);
      layers.push({ name: '3Dから変換', visible:true, canvas:c, ctx });
      activeLayerIndex = layers.length - 1;
      renderLayerList(); pushHistory();
      showScreen('editor');
    };
    img.src = dataURL;
  });

  // ================= ④ アニメーション =================
  let currentAnimation = null;
  let animFrameIndex = 0;
  let animPlaying = false; let animTimer = null;

  function renderFrameStrip(){
    const strip = document.getElementById('frameStrip');
    strip.innerHTML = '';
    currentAnimation.frames.forEach((f, i) => {
      const item = document.createElement('div');
      item.className = 'frame-item' + (i === animFrameIndex ? ' active' : '');
      item.innerHTML = `<div class="frame-thumb"><img src="${f}"></div><div class="frame-num">${i+1}</div>`;
      item.addEventListener('click', () => { animFrameIndex = i; renderFrameStrip(); drawAnimPreviewFrame(i); });
      strip.appendChild(item);
    });
  }
  function drawAnimPreviewFrame(i){
    const canvas = document.getElementById('animPreviewCanvas'); canvas.width = CW; canvas.height = CH;
    const ctx = canvas.getContext('2d');
    const img = new Image(); img.onload = () => ctx.drawImage(img,0,0,CW,CH); img.src = currentAnimation.frames[i];
  }
  document.getElementById('addFrameBtn').addEventListener('click', () => {
    currentAnimation.frames.splice(animFrameIndex+1, 0, currentAnimation.frames[animFrameIndex]);
    animFrameIndex++; renderFrameStrip(); drawAnimPreviewFrame(animFrameIndex);
  });
  document.getElementById('addFrame7Btn').addEventListener('click', () => {
    for (let i = 0; i < 7; i++) currentAnimation.frames.splice(animFrameIndex+1+i, 0, currentAnimation.frames[animFrameIndex]);
    animFrameIndex += 7; renderFrameStrip(); drawAnimPreviewFrame(animFrameIndex);
  });
  document.getElementById('delFrameBtn').addEventListener('click', () => {
    if (currentAnimation.frames.length <= 1) { alert('最後の1枚は消せないよ。'); return; }
    currentAnimation.frames.splice(animFrameIndex, 1);
    animFrameIndex = Math.max(0, animFrameIndex - 1);
    renderFrameStrip(); drawAnimPreviewFrame(animFrameIndex);
  });
  document.getElementById('editFrameBtn').addEventListener('click', () => {
    const dataURL = currentAnimation.frames[animFrameIndex];
    editorContext = { mode:'frame', animId: currentAnimation.id, frameIndex: animFrameIndex };
    document.getElementById('editorTitleInput').value = currentAnimation.title + ' - フレーム' + (animFrameIndex+1);
    initEditor([{ name:'フレーム', visible:true, dataURL }]);
    showScreen('editor');
  });
  document.getElementById('animPlayBtn').addEventListener('click', () => {
    animPlaying = !animPlaying;
    document.getElementById('animPlayBtn').textContent = animPlaying ? '⏸' : '▶';
    if (animPlaying) {
      const fps = Number(document.getElementById('animFps').value) || 30;
      animTimer = setInterval(() => {
        animFrameIndex = (animFrameIndex + 1) % currentAnimation.frames.length;
        drawAnimPreviewFrame(animFrameIndex); renderFrameStrip();
      }, 1000 / fps);
    } else { clearInterval(animTimer); }
  });
  document.getElementById('animBack').addEventListener('click', () => { clearInterval(animTimer); animPlaying = false; loadGallery(); showScreen('gallery'); });
  document.getElementById('animSaveBtn').addEventListener('click', async () => {
    clearMsg('animMsg');
    const title = document.getElementById('animTitleInput').value.trim() || 'むだい';
    const fps = Number(document.getElementById('animFps').value) || 30;
    try {
      await setDoc(doc(db, 'artworks', currentAnimation.id), {
        ownerUid: currentUser.uid, title, type:'animation', frames: currentAnimation.frames, fps, canvasW: CW, canvasH: CH,
        folder: currentAnimation.folder || '', favorite: currentAnimation.favorite || false,
        thumbnail: currentAnimation.frames[0], updatedAtMs: Date.now(), updatedAt: serverTimestamp()
      }, { merge:true });
      currentAnimation.title = title; currentAnimation.fps = fps;
      setMsg('animMsg', '保存したよ ✓', 'success');
    } catch (err) { setMsg('animMsg', '保存できなかった: ' + err.message, 'error'); }
  });
</script>
