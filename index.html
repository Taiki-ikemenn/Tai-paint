<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>たいドロー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
  :root{
    --navy:#10182B; --navy-2:#182240; --card:#1C2747;
    --ink:#F3F1EA; --ink-dim:#9AA4C4;
    --violet:#B47CFF; --pink:#FF7AAE; --teal:#48D8C7; --amber:#FF9A3D;
    --line:#2C3760; --danger:#FF6B6B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    background:
      radial-gradient(1100px 600px at 15% -10%, #2A2450 0%, transparent 60%),
      radial-gradient(900px 500px at 110% 10%, #1B2A4A 0%, transparent 55%),
      var(--navy);
    color:var(--ink); font-family:'M PLUS Rounded 1c', sans-serif;
  }
  .mono{font-family:'JetBrains Mono', monospace;}
  .hidden{ display:none !important; }
  .screen{ min-height:100vh; padding:20px 14px 40px; }
  .wrap{ max-width:480px; margin:0 auto; }

  .brand{ display:flex; align-items:center; gap:10px; margin-bottom:16px; padding-left:2px; }
  .brand .mark{
    width:32px;height:32px;border-radius:10px;
    background:linear-gradient(145deg, var(--violet), var(--pink));
    display:flex;align-items:center;justify-content:center;
    font-weight:800; color:#1C1030; font-size:15px;
  }
  .brand span{ font-weight:800; font-size:16px; }
  .brand small{ color:var(--ink-dim); font-size:11px; display:block; }

  .card{
    background:var(--card); border:1px solid var(--line); border-radius:18px;
    padding:20px; box-shadow:0 16px 40px rgba(0,0,0,.32); margin-bottom:14px;
  }
  h1{ font-size:19px; margin:0 0 4px; font-weight:800; }
  .sub{ color:var(--ink-dim); font-size:13px; margin:0 0 16px; line-height:1.5; }

  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:12px; color:var(--ink-dim); margin-bottom:6px; }
  .field input, .field select{
    width:100%; padding:11px 13px; background:var(--navy-2); border:1px solid var(--line);
    border-radius:11px; color:var(--ink); font-size:14px; font-family:inherit; outline:none;
  }
  .field input:focus{ border-color:var(--violet); }

  .btn{
    width:100%; padding:12px 14px; border-radius:11px; border:none;
    font-family:inherit; font-weight:700; font-size:14px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn:active{ transform:scale(.98); }
  .btn-primary{ background:var(--violet); color:#1C1030; margin-top:6px; }
  .btn-google{ background:#fff; color:#1F2937; margin-top:8px; }
  .btn-outline{ background:transparent; color:var(--ink); border:1px solid var(--line); margin-top:8px; }
  .btn-danger{ background:transparent; color:var(--danger); border:1px solid #5A2E33; margin-top:8px; }
  .btn-sm{ width:auto; padding:7px 11px; font-size:12px; margin-top:0; }
  .btn-google svg{width:16px;height:16px;}

  .divider{ display:flex; align-items:center; gap:10px; margin:14px 0; color:var(--ink-dim); font-size:11px; }
  .divider::before, .divider::after{ content:""; flex:1; height:1px; background:var(--line); }
  .switch-mode{ text-align:center; margin-top:14px; font-size:12.5px; color:var(--ink-dim); }
  .switch-mode a{ color:var(--violet); text-decoration:none; font-weight:600; cursor:pointer; }

  .msg{ font-size:12px; padding:9px 11px; border-radius:9px; margin-bottom:10px; display:none; line-height:1.5; }
  .msg.show{ display:block; }
  .msg.error{ background:#3A1B1E; color:#FFB3B3; border:1px solid #5A2E33; }
  .msg.success{ background:#12332C; color:#9CEFDD; border:1px solid #2C6A5F; }

  /* ---- ①ギャラリー ---- */
  .gallery-toolbar{ display:flex; gap:8px; margin-bottom:14px; }
  .gallery-toolbar input{ flex:1; padding:10px 12px; background:var(--navy-2); border:1px solid var(--line); border-radius:10px; color:var(--ink); font-family:inherit; font-size:13px; }
  .gallery-toolbar button{ background:var(--violet); color:#1C1030; border:none; border-radius:10px; width:40px; font-size:18px; font-weight:800; cursor:pointer; }
  .gallery-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .gallery-item{
    background:var(--navy-2); border:1px solid var(--line); border-radius:12px;
    overflow:hidden; cursor:pointer;
  }
  .gallery-thumb{ width:100%; aspect-ratio:4/3; background:#0B1120; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .gallery-thumb img{ width:100%; height:100%; object-fit:cover; }
  .gallery-meta{ padding:8px 10px; }
  .gallery-title{ font-size:12.5px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .gallery-date{ font-size:10.5px; color:var(--ink-dim); font-family:'JetBrains Mono', monospace; }
  .gallery-type{ font-size:9.5px; color:var(--violet); font-family:'JetBrains Mono', monospace; }
  .top-actions{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .icon-btn{ background:var(--navy-2); border:1px solid var(--line); color:var(--ink); width:34px; height:34px; border-radius:10px; cursor:pointer; font-size:15px; }

  /* ---- ②2D描画エディタ ---- */
  .editor-wrap{ max-width:none; padding:10px; }
  .editor-top{ display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
  .editor-title-input{ flex:1; min-width:100px; background:var(--navy-2); border:1px solid var(--line); border-radius:9px; padding:8px 10px; color:var(--ink); font-family:inherit; font-size:13px; }
  .canvas-stage{
    position:relative; margin:0 auto 10px; background:#fff; border-radius:10px; overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.4); touch-action:none;
  }
  .canvas-stage canvas{ position:absolute; top:0; left:0; }
  .toolrow{ display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; margin-bottom:8px; }
  .tool-btn{
    flex-shrink:0; width:46px; height:46px; border-radius:11px; background:var(--navy-2);
    border:1px solid var(--line); color:var(--ink); font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .tool-btn.active{ background:var(--violet); color:#1C1030; border-color:var(--violet); }
  .subtool-row{ display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 12px; margin-bottom:8px; flex-wrap:wrap; }
  .subtool-row label{ font-size:11px; color:var(--ink-dim); }
  .subtool-row input[type=range]{ flex:1; min-width:80px; }
  .subtool-row input[type=color]{ width:34px; height:34px; border:none; border-radius:8px; background:none; padding:0; }
  .layers-panel{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px; margin-bottom:8px; }
  .layers-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .layers-header b{ font-size:12.5px; }
  .layer-row{
    display:flex; align-items:center; gap:8px; padding:7px 8px; background:var(--navy-2);
    border:1px solid var(--line); border-radius:9px; margin-bottom:6px; font-size:12px;
  }
  .layer-row.active{ border-color:var(--violet); }
  .layer-row span{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .layer-row button{ background:none; border:none; color:var(--ink-dim); cursor:pointer; font-size:13px; padding:2px 4px; }
  .bottom-actions{ display:flex; gap:8px; }
  .bottom-actions .btn{ margin-top:0; }

  /* ---- ③3Dエディタ ---- */
  .three-stage{ width:100%; aspect-ratio:4/3; border-radius:12px; overflow:hidden; background:#0B1120; margin-bottom:10px; }
  .prim-row{ display:flex; gap:8px; overflow-x:auto; margin-bottom:10px; }
  .prim-btn{ flex-shrink:0; padding:9px 12px; border-radius:10px; background:var(--navy-2); border:1px solid var(--line); color:var(--ink); font-size:12.5px; cursor:pointer; }
  .obj-list{ max-height:120px; overflow-y:auto; margin-bottom:10px; }
  .obj-row{ display:flex; align-items:center; gap:8px; padding:7px 8px; background:var(--navy-2); border:1px solid var(--line); border-radius:9px; margin-bottom:6px; font-size:12px; cursor:pointer; }
  .obj-row.active{ border-color:var(--violet); }
  .obj-row span{ flex:1; }
  .transform-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-bottom:10px; }
  .transform-grid .field{ margin-bottom:0; }
  .transform-grid label{ font-size:10px; }
  .transform-grid input{ padding:8px; font-size:12px; }

  /* ---- ④アニメーション ---- */
  .anim-preview{ width:100%; aspect-ratio:4/3; background:#fff; border-radius:12px; margin-bottom:10px; overflow:hidden; position:relative; }
  .anim-preview canvas{ width:100%; height:100%; }
  .anim-controls{ display:flex; gap:8px; align-items:center; margin-bottom:10px; }
  .anim-controls button{ background:var(--navy-2); border:1px solid var(--line); color:var(--ink); width:40px; height:40px; border-radius:10px; font-size:16px; cursor:pointer; }
  .anim-controls input{ width:70px; padding:8px; background:var(--navy-2); border:1px solid var(--line); border-radius:9px; color:var(--ink); font-family:inherit; font-size:12px; }
  .frame-strip{ display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; margin-bottom:10px; }
  .frame-item{ flex-shrink:0; width:60px; text-align:center; cursor:pointer; }
  .frame-thumb{ width:60px; height:45px; background:#fff; border-radius:8px; border:2px solid var(--line); overflow:hidden; }
  .frame-item.active .frame-thumb{ border-color:var(--violet); }
  .frame-thumb img{ width:100%; height:100%; object-fit:cover; }
  .frame-num{ font-size:10px; color:var(--ink-dim); font-family:'JetBrains Mono', monospace; margin-top:2px; }

  .footnote{ text-align:center; color:var(--ink-dim); font-size:11px; margin-top:14px; opacity:.7; }
</style>
</head>
<body>

<!-- ==== アカウント連携画面 ==== -->
<div id="linkScreen" class="screen">
  <div class="wrap">
    <div class="brand"><div class="mark">D</div><div><span>たいドロー</span><small>tai-draw</small></div></div>
    <div class="card">
      <h1>アカウントと連携</h1>
      <p class="sub">たいアカウントでログインすると、作品をクラウドに保存できるようになるよ。</p>
      <div id="linkMsg" class="msg"></div>
      <button class="btn btn-google" id="googleBtn">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M23.52 12.27c0-.85-.08-1.67-.22-2.45H12v4.64h6.47a5.53 5.53 0 0 1-2.4 3.63v3h3.87c2.27-2.09 3.58-5.17 3.58-8.82z"/><path fill="#34A853" d="M12 24c3.24 0 5.96-1.07 7.95-2.91l-3.87-3c-1.08.72-2.45 1.15-4.08 1.15-3.13 0-5.78-2.11-6.73-4.96H1.28v3.09A11.996 11.996 0 0 0 12 24z"/><path fill="#FBBC05" d="M5.27 14.28A7.2 7.2 0 0 1 4.89 12c0-.79.14-1.56.38-2.28V6.63H1.28A12 12 0 0 0 0 12c0 1.94.47 3.77 1.28 5.37l3.99-3.09z"/><path fill="#EA4335" d="M12 4.76c1.77 0 3.35.61 4.6 1.8l3.42-3.42C17.95 1.19 15.23 0 12 0 7.31 0 3.26 2.69 1.28 6.63l3.99 3.09C6.22 6.87 8.87 4.76 12 4.76z"/></svg>
        Googleで連携する
      </button>
      <div class="divider">または</div>
      <div class="field"><label>メールアドレス</label><input type="email" id="linkEmail" placeholder="you@example.com"></div>
      <div class="field"><label>パスワード</label><input type="password" id="linkPassword" placeholder="6文字以上"></div>
      <button class="btn btn-primary" id="linkLoginBtn">ログインして連携</button>
      <div class="switch-mode">アカウントがない？ <a id="toLinkSignup">新規登録</a></div>
    </div>
  </div>
</div>

<div id="linkSignupScreen" class="screen hidden">
  <div class="wrap">
    <div class="brand"><div class="mark">D</div><div><span>たいドロー</span><small>tai-draw</small></div></div>
    <div class="card">
      <h1>新規登録</h1>
      <p class="sub">たいアカウントセンターと共通のアカウントを作るよ。</p>
      <div id="linkSignupMsg" class="msg"></div>
      <div class="field"><label>表示名</label><input type="text" id="signupName" placeholder="ニックネーム"></div>
      <div class="field"><label>メールアドレス</label><input type="email" id="signupEmail" placeholder="you@example.com"></div>
      <div class="field"><label>パスワード</label><input type="password" id="signupPassword" placeholder="6文字以上"></div>
      <button class="btn btn-primary" id="signupBtn">登録する</button>
      <div class="switch-mode"><a id="toLinkLogin">ログインにもどる</a></div>
    </div>
  </div>
</div>

<!-- ==== ① ギャラリー画面 ==== -->
<div id="galleryScreen" class="screen hidden">
  <div class="wrap">
    <div class="brand"><div class="mark">D</div><div><span>たいドロー</span><small id="galleryGreeting">-</small></div></div>
    <div class="card">
      <div class="top-actions">
        <h1 style="margin:0;">さくひん一覧</h1>
        <button class="icon-btn" id="galleryLogoutBtn">⎋</button>
      </div>
      <div class="gallery-toolbar">
        <input type="text" id="gallerySearch" placeholder="🔍 タイトルで検索">
        <button id="galleryNewBtn">＋</button>
      </div>
      <div id="galleryGrid" class="gallery-grid"></div>
      <p class="sub" id="galleryEmpty" style="margin-top:14px;">まだ作品がないよ。「＋」から新規作成してみて！</p>
    </div>
    <p class="footnote">tai-draw · powered by tai-account</p>
  </div>
</div>

<!-- ==== 新規作成モーダル ==== -->
<div id="newModal" class="screen hidden">
  <div class="wrap">
    <div class="card">
      <h1>新規作成</h1>
      <p class="sub">タイトルと種類を選んでね。</p>
      <div class="field"><label>タイトル</label><input type="text" id="newTitle" placeholder="むだい"></div>
      <div class="field">
        <label>種類</label>
        <select id="newType"><option value="drawing">2D イラスト</option><option value="animation">アニメーション</option></select>
      </div>
      <button class="btn btn-primary" id="newCreateBtn">作成してひらく</button>
      <button class="btn btn-outline" id="newCancelBtn">キャンセル</button>
    </div>
  </div>
</div>

<!-- ==== ② 2D描画エディタ ==== -->
<div id="editorScreen" class="screen hidden">
  <div class="wrap editor-wrap">
    <div class="editor-top">
      <button class="icon-btn" id="editorBack">←</button>
      <input type="text" id="editorTitleInput" class="editor-title-input" placeholder="タイトル">
      <button class="icon-btn" id="editorTo3D" title="3Dへ">◆</button>
      <button class="icon-btn" id="editorToAnim" title="アニメーションへ">▶</button>
      <button class="icon-btn" id="editorSaveBtn" title="保存">💾</button>
    </div>

    <div id="canvasStage" class="canvas-stage" style="width:100%; max-width:480px; aspect-ratio:4/3;"></div>

    <div class="toolrow">
      <button class="tool-btn active" data-tool="pen" title="ペン">✎</button>
      <button class="tool-btn" data-tool="eraser" title="消しゴム">▱</button>
      <button class="tool-btn" data-tool="bucket" title="塗りつぶし">🪣</button>
      <button class="tool-btn" data-tool="eyedropper" title="スポイト">💧</button>
      <button class="tool-btn" data-tool="rect" title="四角形">▭</button>
      <button class="tool-btn" data-tool="circle" title="円">○</button>
      <button class="tool-btn" data-tool="text" title="テキスト">T</button>
      <button class="tool-btn" id="undoBtn" title="もどす">↶</button>
      <button class="tool-btn" id="redoBtn" title="すすむ">↷</button>
    </div>

    <div class="subtool-row">
      <input type="color" id="colorPicker" value="#222222">
      <label>太さ</label>
      <input type="range" id="sizeSlider" min="1" max="60" value="6">
      <span id="sizeLabel" class="mono" style="font-size:11px;">6</span>
    </div>

    <div class="layers-panel">
      <div class="layers-header">
        <b>レイヤー</b>
        <button class="icon-btn btn-sm" id="addLayerBtn">＋</button>
      </div>
      <div id="layerList"></div>
    </div>

    <div id="editorMsg" class="msg"></div>
  </div>
</div>

<!-- ==== ③ 3Dエディタ ==== -->
<div id="editor3DScreen" class="screen hidden">
  <div class="wrap">
    <div class="editor-top">
      <button class="icon-btn" id="editor3DBack">←</button>
      <h1 style="margin:0; font-size:16px;">3Dビュー</h1>
      <button class="icon-btn" id="convertTo2DBtn" title="2Dへ変換">▤</button>
    </div>
    <div id="threeStage" class="three-stage"></div>
    <div class="prim-row">
      <button class="prim-btn" data-prim="box">📦 立方体</button>
      <button class="prim-btn" data-prim="sphere">⚪ 球</button>
      <button class="prim-btn" data-prim="cylinder">🥫 円柱</button>
      <button class="prim-btn" data-prim="cone">🔺 円錐</button>
      <button class="prim-btn" id="delObjBtn">🗑 削除</button>
    </div>
    <div class="layers-panel">
      <div class="layers-header"><b>オブジェクト</b></div>
      <div id="objList" class="obj-list"></div>
      <div class="field"><label>色</label><input type="color" id="objColor" value="#48D8C7" style="width:100%; height:38px;"></div>
      <div class="transform-grid">
        <div class="field"><label>X位置</label><input type="number" id="posX" step="0.1"></div>
        <div class="field"><label>Y位置</label><input type="number" id="posY" step="0.1"></div>
        <div class="field"><label>Z位置</label><input type="number" id="posZ" step="0.1"></div>
        <div class="field"><label>回転X</label><input type="number" id="rotX" step="5"></div>
        <div class="field"><label>回転Y</label><input type="number" id="rotY" step="5"></div>
        <div class="field"><label>回転Z</label><input type="number" id="rotZ" step="5"></div>
        <div class="field"><label>大きさ</label><input type="number" id="scaleAll" step="0.1" min="0.1"></div>
      </div>
    </div>
    <div id="editor3DMsg" class="msg"></div>
  </div>
</div>

<!-- ==== ④ アニメーション画面 ==== -->
<div id="animScreen" class="screen hidden">
  <div class="wrap">
    <div class="editor-top">
      <button class="icon-btn" id="animBack">←</button>
      <input type="text" id="animTitleInput" class="editor-title-input" placeholder="タイトル">
      <button class="icon-btn" id="animSaveBtn" title="保存">💾</button>
    </div>
    <div class="anim-preview"><canvas id="animPreviewCanvas"></canvas></div>
    <div class="anim-controls">
      <button id="animPlayBtn">▶</button>
      <label class="mono" style="font-size:11px; color:var(--ink-dim);">FPS</label>
      <input type="number" id="animFps" value="30" min="1" max="60">
      <button class="icon-btn" id="editFrameBtn" title="このフレームを編集">✎ 編集</button>
    </div>
    <div class="frame-strip" id="frameStrip"></div>
    <button class="btn btn-outline" id="addFrameBtn">＋ フレームを追加(現在のコピー)</button>
    <div id="animMsg" class="msg"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import {
    getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    signOut, updateProfile, GoogleAuthProvider, signInWithPopup
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, deleteDoc, getDocs, collection, query, where,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDNKPM8KCe6RGWuaQOUDorBtjCD3IGoe1E",
    authDomain: "tai-account.firebaseapp.com",
    projectId: "tai-account",
    storageBucket: "tai-account.firebasestorage.app",
    messagingSenderId: "579819210756",
    appId: "1:579819210756:web:7eba19a9d4c2ac7697cd51"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const googleProvider = new GoogleAuthProvider();

  const CW = 480, CH = 360; // キャンバスの基本サイズ(Firestoreの容量制限内におさめるため控えめ)

  // ================= 画面切り替え =================
  const screens = {
    link: document.getElementById('linkScreen'),
    linkSignup: document.getElementById('linkSignupScreen'),
    gallery: document.getElementById('galleryScreen'),
    newModal: document.getElementById('newModal'),
    editor: document.getElementById('editorScreen'),
    editor3d: document.getElementById('editor3DScreen'),
    anim: document.getElementById('animScreen'),
  };
  function showScreen(name){
    Object.values(screens).forEach(s => s.classList.add('hidden'));
    screens[name].classList.remove('hidden');
  }

  let layers = []; // [{name, visible, canvas}]

  let brushSize = 6;

  function initEditor(layersData){
    stageEl.innerHTML = '';
    layers = layersData.map(l => {
      const c = document.createElement('canvas'); c.width = CW; c.height = CH;
      const ctx = c.getContext('2d');
      if (l.dataURL) { const img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0, CW, CH); img.src = l.dataURL; }
      else { ctx.fillStyle = '#fff'; ctx.fillRect(0,0,CW,CH); }
      c.style.width = '100%'; c.style.height = '100%'; c.style.display = l.visible === false ? 'none' : 'block';
      return { name: l.name || 'レイヤー', visible: l.visible !== false, canvas: c, ctx };
    });
    layers.forEach(l => stageEl.appendChild(l.canvas));
    overlayCanvas = document.createElement('canvas'); overlayCanvas.width = CW; overlayCanvas.height = CH;
    overlayCanvas.style.width = '100%'; overlayCanvas.style.height = '100%';
    stageEl.appendChild(overlayCanvas);
    overlayCtx = overlayCanvas.getContext('2d');
    activeLayerIndex = layers.length - 1;
    history = []; historyIndex = -1;
    pushHistory();
    renderLayerList();
    bindCanvasEvents();

  function bindCanvasEvents(){
    overlayCanvas.onpointerdown = onPointerDown;
    overlayCanvas.onpointermove = onPointerMove;
    overlayCanvas.onpointerup = onPointerUp;
    overlayCanvas.onpointerleave = onPointerUp;
  }
  function getPos(e){
    const rect = overlayCanvas.getBoundingClientRect();
    return { x: (e.clientX - rect.left) / rect.width * CW, y: (e.clientY - rect.top) / rect.height * CH };
  }
  function activeCtx(){ return layers[activeLayerIndex].ctx; }

  function onPointerDown(e){
    overlayCanvas.setPointerCapture(e.pointerId);
    const p = getPos(e);
    if (tool === 'eyedropper') {
      const d = activeCtx().getImageData(Math.floor(p.x), Math.floor(p.y), 1, 1).data;
      brushColor = '#' + [d[0],d[1],d[2]].map(v => v.toString(16).padStart(2,'0')).join('');
      document.getElementById('colorPicker').value = brushColor;
      tool = 'pen'; setActiveToolBtn('pen');
      return;
    }
    if (tool === 'bucket') { floodFill(activeCtx(), Math.floor(p.x), Math.floor(p.y), brushColor); pushHistory(); return; }
    if (tool === 'text') {
      const t = prompt('テキストを入力してね');
      if (t) { activeCtx().fillStyle = brushColor; activeCtx().font = (brushSize*3) + 'px sans-serif'; activeCtx().fillText(t, p.x, p.y); pushHistory(); }
      return;
    }
    isDrawing = true; shapeStart = p;
    if (tool === 'pen' || tool === 'eraser') {
      const ctx = activeCtx();
      ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.lineWidth = brushSize;
      ctx.globalCompositeOperation = tool === 'eraser' ? 'destination-out' : 'source-over';
      ctx.strokeStyle = brushColor;
      ctx.beginPath(); ctx.moveTo(p.x, p.y);
    }
  }
  function onPointerMove(e){
    if (!isDrawing) return;
    const p = getPos(e);
    if (tool === 'pen' || tool === 'eraser') {
      const ctx = activeCtx(); ctx.lineTo(p.x, p.y); ctx.stroke();
    } else if (tool === 'rect' || tool === 'circle') {
      overlayCtx.clearRect(0,0,CW,CH);
      overlayCtx.strokeStyle = brushColor; overlayCtx.lineWidth = brushSize;
      overlayCtx.beginPath();
      if (tool === 'rect') overlayCtx.strokeRect(shapeStart.x, shapeStart.y, p.x - shapeStart.x, p.y - shapeStart.y);
      else { const r = Math.hypot(p.x - shapeStart.x, p.y - shapeStart.y); overlayCtx.arc(shapeStart.x, shapeStart.y, r, 0, Math.PI*2); overlayCtx.stroke(); }
    }
  }
  function onPointerUp(e){
    if (!isDrawing) return;
    isDrawing = false;
    if (tool === 'rect' || tool === 'circle') {
      const p = getPos(e); const ctx = activeCtx();
      ctx.strokeStyle = brushColor; ctx.lineWidth = brushSize; ctx.beginPath();
      if (tool === 'rect') ctx.strokeRect(shapeStart.x, shapeStart.y, p.x - shapeStart.x, p.y - shapeStart.y);
      else { const r = Math.hypot(p.x - shapeStart.x, p.y - shapeStart.y); ctx.arc(shapeStart.x, shapeStart.y, r, 0, Math.PI*2); ctx.stroke(); }
      overlayCtx.clearRect(0,0,CW,CH);
    }
    pushHistory();
  }

  function floodFill(ctx, x, y, hexColor){
    const img = ctx.getImageData(0,0,CW,CH); const data = img.data;
    const idx = (y*CW+x)*4;
    const target = [data[idx], data[idx+1], data[idx+2], data[idx+3]];
    const r = parseInt(hexColor.slice(1,3),16), g = parseInt(hexColor.slice(3,5),16), b = parseInt(hexColor.slice(5,7),16);
    if (target[0]===r && target[1]===g && target[2]===b) return;
    const stack = [[x,y]];
    while (stack.length) {
      const [cx, cy] = stack.pop();
      if (cx<0||cy<0||cx>=CW||cy>=CH) continue;
      const i = (cy*CW+cx)*4;
      if (data[i]!==target[0]||data[i+1]!==target[1]||data[i+2]!==target[2]||data[i+3]!==target[3]) continue;
      data[i]=r; data[i+1]=g; data[i+2]=b; data[i+3]=255;
      stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
    }
    ctx.putImageData(img, 0, 0);
  }

  document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {

  function pushHistory(){
    const snapshot = layers.map(l => ({ name: l.name, visible: l.visible, dataURL: l.canvas.toDataURL('image/png') }));
    history = history.slice(0, historyIndex + 1);
    history.push(snapshot);
    if (history.length > 15) history.shift();
    historyIndex = history.length - 1;
  }
  function restoreHistory(snapshot){
    snapshot.forEach((l, i) => {
      if (!layers[i]) return;
      const img = new Image();
      img.onload = () => { layers[i].ctx.clearRect(0,0,CW,CH); layers[i].ctx.drawImage(img,0,0,CW,CH); };
      img.src = l.dataURL;
      layers[i].visible = l.visible; layers[i].canvas.style.display = l.visible ? 'block' : 'none';
    });

  }
  document.getElementById('undoBtn').addEventListener('click', () => { if (historyIndex > 0) { historyIndex--; restoreHistory(history[historyIndex]); } });
  document.getElementById('redoBtn').addEventListener('click', () => { if (historyIndex < history.length - 1) { historyIndex++; restoreHistory(history[historyIndex]); } });

  function renderLayerList(){
    const list = document.getElementById('layerList');
    list.innerHTML = '';
    layers.forEach((l, i) => {
      const row = document.createElement('div');
      row.className = 'layer-row' + (i === activeLayerIndex ? ' active' : '');
      row.innerHTML = `<button data-act="vis">${l.visible ? '👁' : '🚫'}</button><span>${l.name}</span><button data-act="up">↑</button><button data-act="down">↓</button><button data-act="del">🗑</button>`;
      row.addEventListener('click', (e) => { if (e.target.tagName !== 'BUTTON') { activeLayerIndex = i; renderLayerList(); } });
      row.querySelector('[data-act="vis"]').addEventListener('click', () => { l.visible = !l.visible; l.canvas.style.display = l.visible ? 'block' : 'none'; renderLayerList(); });
      row.querySelector('[data-act="up"]').addEventListener('click', () => moveLayer(i, -1));
      row.querySelector('[data-act="down"]').addEventListener('click', () => moveLayer(i, 1));
      row.querySelector('[data-act="del"]').addEventListener('click', () => deleteLayer(i));
      list.appendChild(row);
    });
  }
  function moveLayer(i, dir){
    const j = i + dir; if (j < 0 || j >= layers.length) return;
    [layers[i], layers[j]] = [layers[j], layers[i]];

    renderLayerList(); pushHistory();

      item.innerHTML = `<div class="frame-thumb"><img src="${f}"></div><div class="frame-num">${i+1}</div>`;
      item.addEventListener('click', () => { animFrameIndex = i; renderFrameStrip(); drawAnimPreviewFrame(i); });
      strip.appendChild(item);
    });
  }
  function drawAnimPreviewFrame(i){
    const canvas = document.getElementById('animPreviewCanvas'); canvas.width = CW; canvas.height = CH;
    const ctx = canvas.getContext('2d');
    const img = new Image(); img.onload = () => ctx.drawImage(img,0,0,CW,CH); img.src = currentAnimation.frames[i];
  }
  document.getElementById('addFrameBtn').addEventListener('click', () => {
    currentAnimation.frames.splice(animFrameIndex+1, 0, currentAnimation.frames[animFrameIndex]);
    animFrameIndex++; renderFrameStrip(); drawAnimPreviewFrame(animFrameIndex);
  });
  document.getElementById('editFrameBtn').addEventListener('click', () => {
    const dataURL = currentAnimation.frames[animFrameIndex];
    editorContext = { mode:'frame', animId: currentAnimation.id, frameIndex: animFrameIndex };
    document.getElementById('editorTitleInput').value = currentAnimation.title + ' - フレーム' + (animFrameIndex+1);
    initEditor([{ name:'フレーム', visible:true, dataURL }]);
    showScreen('editor');
  });
  document.getElementById('animPlayBtn').addEventListener('click', () => {
    animPlaying = !animPlaying;
    document.getElementById('animPlayBtn').textContent = animPlaying ? '⏸' : '▶';
    if (animPlaying) {
      const fps = Number(document.getElementById('animFps').value) || 30;
      animTimer = setInterval(() => {
        animFrameIndex = (animFrameIndex + 1) % currentAnimation.frames.length;
        drawAnimPreviewFrame(animFrameIndex); renderFrameStrip();
      }, 1000 / fps);
    } else { clearInterval(animTimer); }
  });
  document.getElementById('animBack').addEventListener('click', () => { clearInterval(animTimer); animPlaying = false; loadGallery(); showScreen('gallery'); });
  document.getElementById('animSaveBtn').addEventListener('click', async () => {
    clearMsg('animMsg');
    const title = document.getElementById('animTitleInput').value.trim() || 'むだい';
    const fps = Number(document.getElementById('animFps').value) || 30;
    try {
      await setDoc(doc(db, 'artworks', currentAnimation.id), {
        ownerUid: currentUser.uid, title, type:'animation', frames: currentAnimation.frames, fps,
        thumbnail: currentAnimation.frames[0], updatedAtMs: Date.now(), updatedAt: serverTimestamp()
      }, { merge:true });
      currentAnimation.title = title; currentAnimation.fps = fps;
      setMsg('animMsg', '保存したよ ✓', 'success');
    } catch (err) { setMsg('animMsg', '保存できなかった: ' + err.message, 'error'); }
  });
</script>
</body>
</html>
